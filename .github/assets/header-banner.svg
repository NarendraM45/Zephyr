    <!-- orbit ring around the moon -->
    <g transform="translate(1018,76)">
      <ellipse rx="86" ry="40" fill="none" stroke="#9D97FF" stroke-opacity="0.16" stroke-width="1">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="70s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- moon -->
    <g transform="translate(1018,76)">
      <circle r="74" fill="url(#moonGlow)">
        <animate attributeName="r" values="68;78;68" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.65;1;0.65" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle r="29" fill="url(#moonBody)"/>
      <circle cx="-9" cy="-8" r="4.5" fill="#6C63FF" opacity="0.16"/>
      <circle cx="8" cy="4" r="7"   fill="#6C63FF" opacity="0.13"/>
      <circle cx="-3" cy="12" r="3" fill="#6C63FF" opacity="0.16"/>
    </g>

    <!-- drifting clouds -->
    <g opacity="0.55" filter="url(#softBlur)">
      <g fill="#FFFFFF" opacity="0.06">
        <ellipse cx="195" cy="246" rx="78" ry="28"/>
        <ellipse cx="150" cy="234" rx="50" ry="22"/>
        <ellipse cx="248" cy="238" rx="56" ry="24"/>
        <animateTransform attributeName="transform" type="translate" values="0,0; 14,-4; 0,0" dur="17s" repeatCount="indefinite"/>
