<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Zephyr -- where the sky tells its story">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap');
    .display { font-family: 'Space Grotesk', 'Segoe UI', Helvetica, Arial, sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace; }
      .cursor { animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 50%, 100% { opacity: 0; } }
    ]]></style>

    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#06050E"/>
      <stop offset="42%" stop-color="#1A1640"/>
      <stop offset="78%" stop-color="#2E2659"/>
      <stop offset="100%" stop-color="#3A2E5E"/>
    </linearGradient>

    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="0.15">
      <stop offset="0%"   stop-color="#00C9FF"/>
      <stop offset="50%"  stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#92FE9D"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0" y1="0" x2="430" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#9D97FF"/>
      <stop offset="45%"  stop-color="#00C9FF"/>
      <stop offset="100%" stop-color="#92FE9D"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-160 0; 160 0; -160 0" dur="10s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="moonBody" cx="0.35" cy="0.32" r="0.75">
      <stop offset="0%"  stop-color="#FBFAFF"/>
      <stop offset="60%" stop-color="#E7E3FB"/>
      <stop offset="100%" stop-color="#C9C3EE"/>
    </radialGradient>

    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#A9A0FF" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#6C63FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <clipPath id="frame"><rect width="1200" height="320" rx="28"/></clipPath>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#sky)"/>

