        <ellipse cx="585" cy="250" rx="55" ry="22"/>
        <ellipse cx="705" cy="256" rx="60" ry="24"/>
        <animateTransform attributeName="transform" type="translate" values="0,0; -16,3; 0,0" dur="21s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- aurora bands -->
    <g filter="url(#softBlur)">
      <g opacity="0.22">
        <path d="M0,300 C180,250 360,330 560,288 C800,238 1000,300 1200,266 L1200,320 L0,320 Z" fill="url(#aurora)"/>
        <animateTransform attributeName="transform" type="translate" values="0,0; 18,0; 0,0" dur="13s" repeatCount="indefinite"/>
      </g>
      <g opacity="0.14">
        <path d="M0,312 C220,278 420,332 620,300 C840,266 1040,318 1200,292 L1200,320 L0,320 Z" fill="url(#aurora)"/>
        <animateTransform attributeName="transform" type="translate" values="0,0; -22,0; 0,0" dur="17s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- horizon line + traveling glow -->
    <rect x="0" y="266" width="1200" height="1.4" fill="url(#aurora)" opacity="0.4"/>
    <circle cx="-30" cy="266" r="4" fill="#92FE9D">
      <animateMotion path="M -30,266 L 1230,266" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="8s" repeatCount="indefinite"/>
    </circle>

    <!-- title -->
    <text x="64" y="172" class="display" font-size="84" font-weight="700"
          fill="url(#titleGrad)" letter-spacing="2">ZEPHYR</text>

    <!-- tagline -->
    <text x="67" y="214" class="mono" font-size="18" font-weight="400"
          fill="#FFFFFF" opacity="0.62" letter-spacing="5">WHERE THE SKY TELLS ITS STORY<tspan class="cursor" fill="#92FE9D" opacity="1" letter-spacing="0"> ▌</tspan></text>

    <!-- build tag -->
    <text x="1132" y="296" text-anchor="end" class="mono" font-size="12" fill="#FFFFFF" opacity="0.32" letter-spacing="2">FLUTTER · v1.0.0</text>
