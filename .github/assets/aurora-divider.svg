<svg viewBox="0 0 1200 28" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="section divider">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap');
    .display { font-family: 'Space Grotesk', 'Segoe UI', Helvetica, Arial, sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace; }
    ]]></style>
    <linearGradient id="d_line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C9FF" stop-opacity="0"/>
      <stop offset="12%" stop-color="#00C9FF"/>
      <stop offset="50%" stop-color="#6C63FF"/>
      <stop offset="88%" stop-color="#92FE9D"/>
      <stop offset="100%" stop-color="#92FE9D" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <line x1="0" y1="14" x2="1200" y2="14" stroke="url(#d_line)" stroke-width="1" opacity="0.45"/>

  <g>
    <rect x="-3" y="10" width="8" height="8" fill="#00C9FF" transform="rotate(45 1 14)">
      <animate attributeName="opacity" values="0.25;0.9;0.25" dur="2.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="1195" y="10" width="8" height="8" fill="#92FE9D" transform="rotate(45 1199 14)">
      <animate attributeName="opacity" values="0.9;0.25;0.9" dur="2.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <circle cx="0" cy="14" r="3.2" fill="#FFFFFF">
    <animateMotion path="M 0,14 L 1200,14" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.9;1" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>