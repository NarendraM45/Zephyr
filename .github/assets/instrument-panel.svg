<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Zephyr instrument panel preview">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap');
    .display { font-family: 'Space Grotesk', 'Segoe UI', Helvetica, Arial, sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace; }
    ]]></style>
    <linearGradient id="ip_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A14"/>
      <stop offset="100%" stop-color="#06060D"/>
    </linearGradient>
    <linearGradient id="ip_aurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C9FF"/>
      <stop offset="50%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#92FE9D"/>
    </linearGradient>
    <linearGradient id="ip_uv" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="35%" stop-color="#FBBF24"/>
      <stop offset="65%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="ip_aqi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#00C9FF"/>
    </linearGradient>
    <radialGradient id="ip_moonglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ip_frame"><rect width="1200" height="300" rx="24"/></clipPath>
  </defs>

  <rect width="1200" height="300" rx="24" fill="url(#ip_bg)"/>
  <g clip-path="url(#ip_frame)">
    
    <g transform="translate(32,40)">
      <rect width="200" height="220" rx="20" fill="#FFFFFF" opacity="0.03"/>
      <rect width="200" height="220" rx="20" fill="none" stroke="#FFFFFF" stroke-opacity="0.09"/>
      <rect x="14" y="0" width="172" height="1.4" fill="url(#ip_aurora)" opacity="0.35"/>
      <text x="100.0" y="190" text-anchor="middle" class="mono" font-size="11" letter-spacing="2.5" fill="#FFFFFF" opacity="0.55">WIND COMPASS</text>
      <text x="100.0" y="208" text-anchor="middle" class="mono" font-size="10.5" letter-spacing="1" fill="#00C9FF" opacity="0.6">NE · 14 km/h</text>
    
      <circle cx="100.0" cy="86" r="56" fill="none" stroke="#FFFFFF" stroke-opacity="0.14"/>
      <circle cx="100.0" cy="86" r="40" fill="none" stroke="#FFFFFF" stroke-opacity="0.07"/>
      <g class="mono" font-size="9" fill="#FFFFFF" opacity="0.5" text-anchor="middle">
        <text x="100.0" y="40">N</text>
        <text x="150.0" y="89">E</text>
        <text x="100.0" y="140">S</text>
        <text x="51.0" y="89">W</text>
      </g>
      <g>
        <path d="M 100.0,42 L 108.0,82 L 100.0,74 L 92.0,82 Z" fill="#00C9FF"/>
        <path d="M 100.0,130 L 108.0,90 L 100.0,98 L 92.0,90 Z" fill="#6C63FF" opacity="0.6"/>
        <circle cx="100.0" cy="86" r="4" fill="#FFFFFF" opacity="0.8"/>
        <animateTransform attributeName="transform" type="rotate" from="0 100.0 86" to="360 100.0 86" dur="14s" repeatCount="indefinite"/>
      </g>
    </g>

    <g transform="translate(266,40)">
      <rect width="200" height="220" rx="20" fill="#FFFFFF" opacity="0.03"/>
      <rect width="200" height="220" rx="20" fill="none" stroke="#FFFFFF" stroke-opacity="0.09"/>
      <rect x="14" y="0" width="172" height="1.4" fill="url(#ip_aurora)" opacity="0.35"/>
      <text x="100.0" y="190" text-anchor="middle" class="mono" font-size="11" letter-spacing="2.5" fill="#FFFFFF" opacity="0.55">UV INDEX</text>
      <text x="100.0" y="208" text-anchor="middle" class="mono" font-size="10.5" letter-spacing="1" fill="#00C9FF" opacity="0.6">MODERATE · 5</text>
    
      <path d="M 44.0,104 A 56,56 0 0 1 156.0,104" fill="none" stroke="url(#ip_uv)" stroke-width="9" stroke-linecap="round"/>
      <circle cx="44.0" cy="104" r="6" fill="#FFFFFF">
        <animateMotion path="M 44.0,104 A 56,56 0 0 1 156.0,104" dur="5s" repeatCount="indefinite"/>
      </circle>
      <text x="100.0" y="98" text-anchor="middle" class="display" font-size="22" font-weight="700" fill="#FFFFFF">5</text>
    </g>

    <g transform="translate(500,40)">
      <rect width="200" height="220" rx="20" fill="#FFFFFF" opacity="0.03"/>
      <rect width="200" height="220" rx="20" fill="none" stroke="#FFFFFF" stroke-opacity="0.09"/>
      <rect x="14" y="0" width="172" height="1.4" fill="url(#ip_aurora)" opacity="0.35"/>
      <text x="100.0" y="190" text-anchor="middle" class="mono" font-size="11" letter-spacing="2.5" fill="#FFFFFF" opacity="0.55">AIR QUALITY</text>
      <text x="100.0" y="208" text-anchor="middle" class="mono" font-size="10.5" letter-spacing="1" fill="#00C9FF" opacity="0.6">GOOD · 42</text>
    
      <circle cx="100.0" cy="86" r="50" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="11"/>
      <circle cx="100.0" cy="86" r="50" fill="none" stroke="url(#ip_aqi)" stroke-width="11" stroke-linecap="round"
        stroke-dasharray="314.2" transform="rotate(-90 100.0 86)">
        <animate attributeName="stroke-dashoffset" values="182.2;157.1;182.2" dur="7s" repeatCount="indefinite"/>
      </circle>
      <text x="100.0" y="92" text-anchor="middle" class="display" font-size="24" font-weight="700" fill="#FFFFFF">42</text>
    </g>

    <g transform="translate(734,40)">
      <rect width="200" height="220" rx="20" fill="#FFFFFF" opacity="0.03"/>
      <rect width="200" height="220" rx="20" fill="none" stroke="#FFFFFF" stroke-opacity="0.09"/>
      <rect x="14" y="0" width="172" height="1.4" fill="url(#ip_aurora)" opacity="0.35"/>
      <text x="100.0" y="190" text-anchor="middle" class="mono" font-size="11" letter-spacing="2.5" fill="#FFFFFF" opacity="0.55">MOON PHASE</text>
      <text x="100.0" y="208" text-anchor="middle" class="mono" font-size="10.5" letter-spacing="1" fill="#00C9FF" opacity="0.6">WANING GIBBOUS</text>
    
      <clipPath id="ip_moonclip"><circle cx="100.0" cy="86" r="48"/></clipPath>
      <circle cx="100.0" cy="86" r="62" fill="url(#ip_moonglow)"/>
      <circle cx="100.0" cy="86" r="48" fill="#E7E3FB"/>
      <g clip-path="url(#ip_moonclip)">
        <circle r="48" fill="#0A0A14" opacity="0.88">
          <animate attributeName="cx" values="8.800000000000011;191.2;8.800000000000011" dur="16s" repeatCount="indefinite"/>
          <animate attributeName="cy" values="86;86;86" dur="16s" repeatCount="indefinite"/>
        </circle>
        <circle cx="88.0" cy="76" r="5" fill="#6C63FF" opacity="0.15"/>
        <circle cx="110.0" cy="92" r="7" fill="#6C63FF" opacity="0.12"/>
      </g>
    </g>

    <g transform="translate(968,40)">
      <rect width="200" height="220" rx="20" fill="#FFFFFF" opacity="0.03"/>
      <rect width="200" height="220" rx="20" fill="none" stroke="#FFFFFF" stroke-opacity="0.09"/>
      <rect x="14" y="0" width="172" height="1.4" fill="url(#ip_aurora)" opacity="0.35"/>
      <text x="100.0" y="190" text-anchor="middle" class="mono" font-size="11" letter-spacing="2.5" fill="#FFFFFF" opacity="0.55">LIVE RADAR</text>
      <text x="100.0" y="208" text-anchor="middle" class="mono" font-size="10.5" letter-spacing="1" fill="#00C9FF" opacity="0.6">RADAR ACTIVE</text>
    
      <clipPath id="ip_radarclip"><circle cx="100.0" cy="86" r="56"/></clipPath>
      <g clip-path="url(#ip_radarclip)">
        <rect x="44.0" y="30" width="112" height="112" fill="#06060D"/>
        <circle cx="100.0" cy="86" r="18.48" fill="none" stroke="#92FE9D" stroke-opacity="0.18"/>
        <circle cx="100.0" cy="86" r="36.96" fill="none" stroke="#92FE9D" stroke-opacity="0.14"/>
        <circle cx="100.0" cy="86" r="56" fill="none" stroke="#92FE9D" stroke-opacity="0.10"/>
        <path d="M 100.0,86 L 100.0,30 A 56,56 0 0 1 139.2,46.800000000000004 Z" fill="#92FE9D" opacity="0.16">
          <animateTransform attributeName="transform" type="rotate" from="0 100.0 86" to="360 100.0 86" dur="4s" repeatCount="indefinite"/>
        </path>
        <circle cx="118.0" cy="72" r="3.5" fill="#92FE9D">
          <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="80.0" cy="96" r="2.5" fill="#00C9FF">
          <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.5;0.65;1" dur="4s" repeatCount="indefinite"/>
        </circle>
      </g>
      <circle cx="100.0" cy="86" r="56" fill="none" stroke="#FFFFFF" stroke-opacity="0.12"/>
    </g>
  </g>
  <rect x="0.75" y="0.75" width="1198.5" height="298.5" rx="23.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.06"/>
</svg>